aid: particle
name: Particle
description: Particle is an integrated IoT Platform-as-a-Service that provides cellular,
  Wi-Fi, and Bluetooth hardware modules alongside a comprehensive cloud platform for
  building and managing connected devices at scale. The Particle Device Cloud exposes
  a REST API that enables developers to call device functions, read variables, publish
  and subscribe to events, manage firmware OTA updates, and administer product fleets.
  Authentication uses OAuth 2.0 bearer tokens, and the platform supports JavaScript,
  iOS, Android, and Windows SDKs as well as a command-line interface. Particle's pricing
  model is based on Data Operations consumed per month, with plans ranging from a
  free prototyping tier through paid block-based plans to enterprise contracts.
