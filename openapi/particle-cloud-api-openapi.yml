openapi: 3.0.3
info:
  title: Particle Cloud API
  description: The Particle Cloud REST API enables developers to interact with Particle-connected devices — calling device
    functions, reading variables, publishing and subscribing to events, managing SIM cards, performing OTA firmware updates,
    and administering product fleets. All requests use OAuth 2.0 bearer tokens and target https://api.particle.io.
  version: 1.0.0
  contact:
    name: Particle Developer Support
    url: https://docs.particle.io/reference/cloud-apis/api/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
externalDocs:
  description: Particle Cloud API Reference
  url: https://docs.particle.io/reference/cloud-apis/api/
servers:
- url: https://api.particle.io
  description: Particle Cloud API
security:
- bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth 2.0 bearer token. Obtain via POST /oauth/token.
  schemas:
    Error:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
        error_description:
          type: string
    Device:
      type: object
      properties:
        id:
          type: string
          description: Device ID (24-char hex)
        name:
          type: string
        last_ip_address:
          type: string
        last_heard:
          type: string
          format: date-time
        last_handshake_at:
          type: string
          format: date-time
        product_id:
          type: integer
        online:
          type: boolean
        platform_id:
          type: integer
        cellular:
          type: boolean
        firmware_version:
          type: string
tags:
- name: Authentication
- name: Configuration
- name: Customers
- name: Devices
- name: Diagnostics
- name: Env
- name: Events
- name: Firmware
- name: FleetHealth
- name: Groups
- name: Integrations
- name: Ledger
- name: Location
- name: Logic
- name: OAuth
- name: Organizations
- name: ProductFirmware
- name: Products
- name: Quarantine
- name: Search
- name: Secrets
- name: ServiceAgreements
- name: Sims
- name: Team
- name: User
paths:
  /oauth/token:
    post:
      summary: Generate a customer scoped access token
      operationId: PostOauthToken
      tags:
      - Customers
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Creates a token scoped to a customer for your organization. You must give a valid product OAuth client
        ID and secret in HTTP Basic Auth or in the client_id and client_secret parameters.
  /v1/access_tokens/{token}:
    delete:
      summary: Delete an access token
      operationId: DeleteAccessToken
      tags:
      - Authentication
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Delete your unused or lost tokens.
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
  /v1/access_tokens:
    delete:
      summary: Delete all active access tokens
      operationId: DeleteActiveAccessTokens
      tags:
      - Authentication
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Delete all your active access tokens.
  /v1/access_tokens/current:
    delete:
      summary: Delete current access token
      operationId: DeleteCurrentAccessToken
      tags:
      - Authentication
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Delete your currently used token.
    get:
      summary: Get the current access token information
      operationId: GetCurrentAccessToken
      tags:
      - Authentication
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Get your currently used token.
  /v1/products/{productIdOrSlug}/config:
    get:
      summary: Get product schema
      operationId: GetProductConfigSchema
      tags:
      - Configuration
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Get the possible values that can be configured for this product, in JSON Schema format
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
    delete:
      summary: Delete product configuration schema
      operationId: DeleteProductConfigSchema
      tags:
      - Configuration
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Delete configuration schema, use Tracker Edge defaults.
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
    put:
      summary: Set product configuration schema
      operationId: SetProductConfigSchema
      tags:
      - Configuration
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Set configuration schema that will become the default for the product. This must be the entire schema,
        including the standard Particle parts; there is no merging of changes.
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
  /v1/products/{productIdOrSlug}/config/{deviceId}:
    get:
      summary: Get device schema
      operationId: GetDeviceConfigSchema
      tags:
      - Configuration
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Get the possible values that can be configured for one device in this product, in JSON Schema format
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
    delete:
      summary: Delete device configuration schema
      operationId: DeleteDeviceConfigSchema
      tags:
      - Configuration
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Delete device's configuration schema, use product's.
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
    put:
      summary: Set device configuration schema
      operationId: SetDeviceSchema
      tags:
      - Configuration
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Set configuration schema for the device. This must be the entire schema, including the standard Particle
        parts; there is no merging of changes.
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
  /v1/products/{productIdOrSlug}/customers/{customerEmail}:
    delete:
      summary: Delete a customer
      operationId: deleteCustomer
      tags:
      - Customers
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Delete a customer in a product. Will also revoke all of this customer's access tokens, pending device claim
        codes and activation codes.
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
      - name: customerEmail
        in: path
        required: true
        schema:
          type: string
    put:
      summary: Update customer password
      operationId: updateCustomerPassword
      tags:
      - Customers
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Update the account password for a customer. Only relevant for non-shadow customers that have a password
        saved in Particle's system. Must be called with an access token that has access to the product, not a customer access
        token.
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
      - name: customerEmail
        in: path
        required: true
        schema:
          type: string
  /v1/products/{productIdOrSlug}/customers:
    post:
      summary: Create a customer - Implicit
      operationId: CreateCustomer
      tags:
      - Customers
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: 'Create a customer for a product using OAuth implicit grant type. This is the way you should hit the POST
        customers endpoint if you are creating customers from a web browser. After a successful POST, the customer access
        token will be appended as a hash to the redirect URI associated with the client credentials provided. For this grant
        type, you must also pass response_type: token. You must give a valid product OAuth client ID in HTTP Basic Auth or
        in the client_id parameter. Do not pass the OAuth client secret when creating customers from a web browser.'
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
    get:
      summary: List customers for a product
      operationId: ListProductCustomers
      tags:
      - Customers
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: List Customers for a product.
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
  /v1/devices:
    post:
      summary: Claim a device
      operationId: ClaimDevice
      tags:
      - Devices
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Claim a new or unclaimed device to your account.
    get:
      summary: List devices
      operationId: ListDevices
      tags:
      - Devices
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: List devices the currently authenticated user has access to. By default, devices will be sorted by last_handshake_at
        in descending order.
  /v1/products/{productIdOrSlug}/devices/{deviceId}:
    delete:
      summary: Deny a quarantined device
      operationId: denyQuarantinedDevice
      tags:
      - Quarantine
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Deny a quarantined device
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get product device information
      operationId: GetProductDevice
      tags:
      - Devices
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Get basic information about a given device that is part of a product See Get device information for the
        response attributes
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
    put:
      summary: Assign groups to a device
      operationId: updateDeviceGroups
      tags:
      - Groups
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Update group memberships for an individual device. This is an absolute endpoint, meaning that regardless
        of previous group memberships, the group names passed to this endpoint will be the ones assigned to the device. If
        you pass a group name that does not yet exist, it will be created and assigned to the device.
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
  /v1/devices/{deviceId}:
    delete:
      summary: Unclaim device
      operationId: unclaimDevice
      tags:
      - Devices
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: 'Remove ownership of a device. This will unclaim regardless if the device is owned by a user or a customer,
        in the case of a product. When using this endpoint to unclaim a product device, the route looks slightly different:
        DELETE /v1/products/:productIdOrSlug/devices/:deviceId/owner Note the /owner at the end of the route.'
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
    put:
      summary: Flash a device with a bundle
      operationId: UpdateDeviceFirmware
      tags:
      - Firmware
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Update the device firmware from a bundle
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get device information
      operationId: GetDevice
      tags:
      - Devices
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Get basic information about the given device, including the custom variables and functions it has exposed.
        This can be called for sandbox devices claimed to your account and for product devices you have access to, regardless
        of claiming.
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
  /v1/serial_numbers/{serial_number}:
    get:
      summary: Look up device identification from a serial number
      operationId: GetV1Serial_numbersSerial_number
      tags:
      - Devices
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Return the device ID and SIM card ICCD (if applicable) for a device by serial number. This API can look
        up devices that you have not yet added to your product and is rate limited to 50 requests per hour. Once you've imported
        your devices to your product you should instead use the list devices in a product API and filter on serial number.
        No special rate limits apply to that API.
      parameters:
      - name: serial_number
        in: path
        required: true
        schema:
          type: string
  /v1/products/{productIdOrSlug}/devices:
    get:
      summary: List devices in a product
      operationId: listDevicesForProduct
      tags:
      - Devices
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: List all devices that are part of a product. Results are paginated, by default returns 25 device records
        per page.
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Approve a quarantined device
      operationId: approveQuarantinedDevice
      tags:
      - Quarantine
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Approve a quarantined device. This will immediately release the device from quarantine and allow it to
        publish events, receive firmware updates, etc.
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
    put:
      summary: Batch assign groups to devices
      operationId: batchAssignDeviceGroups
      tags:
      - Groups
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Assign groups to devices in a product as a batch action. Groups can either be added or removed from all
        devices passed to the endpoint.
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
  /v1/products/{productIdOrSlug}/device_orders:
    get:
      summary: List device orders for a product
      operationId: listDeviceOrdersForProduct
      tags:
      - Devices
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: List device orders associated with the product's organization. Each element represents a single shiment
        from a wholesale device order. Returns the full list — not paginated. Sorted by latest_fulfilled_at desc (most recently
        fulfilled first).
      parameters:
      - name: productIdOrSlug
        in: path
        required: true
        schema:
          type: string
  /v1/devices/{deviceId}/{varName}:
    get:
      summary: Get a variable value
      operationId: GetDeviceVariable
      tags:
      - Devices
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Request the current value of a variable exposed by the device. Variables can be read on a device you own,
        or for any device that is part of a product you are a team member of.
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
      - name: varName
        in: path
        required: true
        schema:
          type: string
  /v1/devices/{deviceId}/{functionName}:
    post:
      summary: Call a function
      operationId: PostV1DevicesDeviceidFunctionname
      tags:
      - Devices
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Call a function exposed by the device, with arguments passed in the request body. Functions can be called
        on a device you own, or for any device that is part of a product you are a team member of.
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
      - name: functionName
        in: path
        required: true
        schema:
          type: string
  /v1/devices/{deviceId}/ping:
    put:
      summary: Ping a device
      operationId: PutV1DevicesDeviceidPing
      tags:
      - Devices
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: This will ping a device, enabling you to see if your device is online or offline
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
  /v1/diagnostics/{deviceId}/update:
    post:
      summary: Refresh device vitals
      operationId: updateDeviceDiagnostics
      tags:
      - Diagnostics
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: 'Refresh diagnostic vitals for a single device. This will instruct the device to publish a new event to
        the Device Cloud containing a device vitals payload. This is an asynchronous request: the HTTP request returns immediately
        after the request to the device is sent. In order for the device to respond with a vitals payload, it must be online
        and connected to the Device Cloud. The device will respond by publishing an event named spark/device/diagnostics/update.
        See the description of the device vitals event.'
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
  /v1/diagnostics/{deviceId}/last:
    get:
      summary: Get last known device vitals
      operationId: getLastDeviceDiagnostics
      tags:
      - Diagnostics
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Returns the last device vitals payload sent by the device to the Device Cloud.
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
  /v1/diagnostics/{deviceId}:
    get:
      summary: Get all historical device vitals
      operationId: getAllDeviceDiagnostics
      tags:
      - Diagnostics
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Returns all stored device vital records sent by the device to the Device Cloud. Device vitals records will
        expire after 1 month.
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
  /v1/sims/{iccid}/status:
    get:
      summary: Get cellular network status
      operationId: getCellularNetworkStatus
      tags:
      - Diagnostics
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Get cellular network status for a given device. Kicks off a long running task that checks if the device/SIM
        has an active data session with a cell tower. Values for keys in the sim_status object will be null until the task
        has finished. Poll the endpoint until meta.state is complete. At this point, the sim_status object will be populated.
        Note that responses are cached by the cellular network providers. This means that on occasion, the real-time status
        of the device/SIM may not align with the results of this test.
      parameters:
      - name: iccid
        in: path
        required: true
        schema:
          type: string
  /v1/env:
    get:
      summary: List environment variables
      operationId: listEnv
      tags:
      - Env
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: List environment variables for an organization, Sandbox, product, or device.
    patch:
      summary: Bulk update environment variables
      operationId: patchEnv
      tags:
      - Env
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Apply multiple changes to environment variables for an organization, Sandbox, product, or device in a single
        request.
  /v1/env/{key}:
    put:
      summary: Set environment variable
      operationId: setEnv
      tags:
      - Env
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Create or update a single environment variable for an organization, Sandbox, product, or device.
      parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
    delete:
      summary: Delete environment variable
      operationId: deleteEnv
      tags:
      - Env
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Delete a single environment variable for an organization, Sandbox, product, or device.
      parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
  /v1/env/render:
    get:
      summary: Render environment variables
      operationId: renderEnv
      tags:
      - Env
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Render environment variables for an organization, Sandbox, product, or device. The response is a flat key/value
        map of the effective variables after inheritance and overrides are applied.
  /v1/env/rollout:
    get:
      summary: Review environment variables rollout
      operationId: reviewEnvRollout
      tags:
      - Env
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Review changes that can be rolled out
    post:
      summary: Start environment variables rollout
      operationId: startEnvRollout
      tags:
      - Env
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Apply updated environment variable values and make them available to devices. When rolling out immediately,
        devices that are currently available to receive OTA updates will receive updated environment variables. Devices that
        are busy or offline will apply the update when they become ready. When rolling out on next connection, as devices
        handshake (begin new secure sessions) with the Device Cloud, they will receive updated environment variables.
  /v1/events/{eventPrefix}:
    get:
      summary: Get a stream of events
      operationId: GetEvents
      tags:
      - Events
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Open a stream of Server Sent Events for all events. for your devices matching the filter. Note that as
        of April 2018, the event prefix filter is required. It was optional before.
      parameters:
      - name: eventPrefix
        in: path
        required: true
        schema:
          type: string
  /v1/devices/events/{eventPrefix}:
    get:
      summary: Get a stream of your events
      operationId: GetDeviceEvents
      tags:
      - Events
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Open a stream of Server Sent Events for all events for your devices.
      parameters:
      - name: eventPrefix
        in: path
        required: true
        schema:
          type: string
  /v1/devices/{deviceId}/events/{eventPrefix}:
    get:
      summary: Get a stream of events for a device
      operationId: GetDeviceEvents
      tags:
      - Events
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad request
        '401':
          description: Unauthorized
      description: Open a stream of Server Sent Events for all events for the specified device.
      parameters:
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
      - name: eventPrefix
        in: path
        required: true
        schema:
          type: string
