      description: 'Reports outbound integration requests that are sent on behalf of this product fleet and the outcome. Each
        time bucket contains counts of (keys with a value of 0 will be omitted): success: the integration request was accepted
        by the destination service (2xx response code). failure: the integration request was rejected by the destination service
        (network error, 4xx or 5xx response code) after 3 attempts. sleep (skipped): the integration request was not attempted
        because there have been too many previous failures in rapid succession. Can be filtered to include only integrations
